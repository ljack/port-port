name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DEVELOPER_ID: "Developer ID Application"

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test

  build:
    needs: test
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binaries
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Import code-signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Code-sign binaries
        run: |
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID" \
            .build/apple/Products/Release/port-port-cli
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID" \
            .build/apple/Products/Release/port-port-mcp

      - name: Package release tarball
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="port-port-v${VERSION}-macos.tar.gz"

          mkdir -p staging
          cp .build/apple/Products/Release/port-port-cli staging/
          cp .build/apple/Products/Release/port-port-mcp staging/
          tar -czf "$ARCHIVE" -C staging port-port-cli port-port-mcp

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256 checksum
        id: checksum
        run: |
          SHA=$(shasum -a 256 "${{ steps.package.outputs.archive }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  ${{ steps.package.outputs.archive }}" > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ${{ steps.package.outputs.archive }}
            checksums.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            port-port-*.tar.gz
            checksums.txt

  update-homebrew:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="${{ needs.build.outputs.sha256 }}"
          URL="https://github.com/ljack/port-port/releases/download/${GITHUB_REF_NAME}/port-port-v${VERSION}-macos.tar.gz"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ljack/homebrew-port-port.git" tap
          cd tap

          cat > Formula/port-port.rb << RUBY
          class PortPort < Formula
            desc "CLI tools for monitoring and managing listening ports on macOS"
            homepage "https://github.com/ljack/port-port"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "port-port-cli"
              bin.install "port-port-mcp"
            end

            test do
              assert_match "USAGE", shell_output("#{bin}/port-port-cli --help")
            end
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/port-port.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/port-port.rb
          git commit -m "Update port-port to ${VERSION}"
          git push
