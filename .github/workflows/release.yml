name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DEVELOPER_ID: "Developer ID Application"

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test

  build:
    needs: test
    runs-on: macos-15
    outputs:
      cli_sha256: ${{ steps.checksum.outputs.cli_sha256 }}
      app_sha256: ${{ steps.checksum.outputs.app_sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binaries
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Import code-signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Code-sign CLI binaries
        run: |
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID" \
            .build/apple/Products/Release/port-port-cli
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID" \
            .build/apple/Products/Release/port-port-mcp

      - name: Create .app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="PortPort.app"
          CONTENTS="${APP}/Contents"
          MACOS="${CONTENTS}/MacOS"
          RESOURCES="${CONTENTS}/Resources"

          mkdir -p "${MACOS}" "${RESOURCES}"
          cp .build/apple/Products/Release/port-port "${MACOS}/port-port"
          cp Sources/PortPortApp/Info.plist "${CONTENTS}/Info.plist"
          cp Sources/PortPortApp/AppIcon.icns "${RESOURCES}/AppIcon.icns"
          cp Sources/PortPortApp/Resources/menubar-icon.png "${RESOURCES}/menubar-icon.png"
          cp Sources/PortPortApp/Resources/menubar-icon@2x.png "${RESOURCES}/menubar-icon@2x.png"

          # Update version in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${CONTENTS}/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "${CONTENTS}/Info.plist"

      - name: Code-sign .app bundle
        run: |
          codesign --force --deep --options runtime \
            --sign "$DEVELOPER_ID" \
            "PortPort.app"

      - name: Notarize .app bundle
        env:
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Write API key to disk
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_KEY" | base64 --decode -o ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Create zip for notarization
          ditto -c -k --keepParent "PortPort.app" "PortPort-notarize.zip"

          # Submit for notarization and wait
          xcrun notarytool submit "PortPort-notarize.zip" \
            --key ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple "PortPort.app"

          rm "PortPort-notarize.zip"

      - name: Package CLI tarball
        id: cli_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="port-port-v${VERSION}-macos.tar.gz"

          mkdir -p staging-cli
          cp .build/apple/Products/Release/port-port-cli staging-cli/
          cp .build/apple/Products/Release/port-port-mcp staging-cli/
          tar -czf "$ARCHIVE" -C staging-cli port-port-cli port-port-mcp

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Package .app zip
        id: app_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="Port-Port-v${VERSION}.zip"
          ditto -c -k --keepParent "PortPort.app" "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256 checksums
        id: checksum
        run: |
          CLI_SHA=$(shasum -a 256 "${{ steps.cli_package.outputs.archive }}" | awk '{print $1}')
          APP_SHA=$(shasum -a 256 "${{ steps.app_package.outputs.archive }}" | awk '{print $1}')
          echo "cli_sha256=$CLI_SHA" >> "$GITHUB_OUTPUT"
          echo "app_sha256=$APP_SHA" >> "$GITHUB_OUTPUT"

          echo "$CLI_SHA  ${{ steps.cli_package.outputs.archive }}" > checksums.txt
          echo "$APP_SHA  ${{ steps.app_package.outputs.archive }}" >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ${{ steps.cli_package.outputs.archive }}
            ${{ steps.app_package.outputs.archive }}
            checksums.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            port-port-*.tar.gz
            Port-Port-*.zip
            checksums.txt

  update-homebrew:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CLI_SHA256="${{ needs.build.outputs.cli_sha256 }}"
          APP_SHA256="${{ needs.build.outputs.app_sha256 }}"
          CLI_URL="https://github.com/ljack/port-port/releases/download/${GITHUB_REF_NAME}/port-port-v${VERSION}-macos.tar.gz"
          APP_URL="https://github.com/ljack/port-port/releases/download/${GITHUB_REF_NAME}/Port-Port-v${VERSION}.zip"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ljack/homebrew-port-port.git" tap
          cd tap

          mkdir -p Casks

          cat > Formula/port-port.rb << RUBY
          class PortPort < Formula
            desc "CLI tools for monitoring and managing listening ports on macOS"
            homepage "https://github.com/ljack/port-port"
            url "${CLI_URL}"
            sha256 "${CLI_SHA256}"
            version "${VERSION}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "port-port-cli"
              bin.install "port-port-mcp"
            end

            test do
              assert_match "USAGE", shell_output("#{bin}/port-port-cli --help")
            end
          end
          RUBY

          cat > Casks/port-port-app.rb << RUBY
          cask "port-port-app" do
            version "${VERSION}"
            sha256 "${APP_SHA256}"

            url "${APP_URL}"
            name "PortPort"
            desc "Menu bar app for monitoring listening ports on macOS"
            homepage "https://github.com/ljack/port-port"

            depends_on macos: ">= :sequoia"

            app "PortPort.app"

            zap trash: [
              "~/Library/Application Support/port-port",
            ]
          end
          RUBY

          # Remove leading whitespace from heredocs
          sed -i 's/^          //' Formula/port-port.rb
          sed -i 's/^          //' Casks/port-port-app.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/port-port.rb Casks/port-port-app.rb
          git commit -m "Update port-port to ${VERSION}"
          git push
