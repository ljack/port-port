<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Menu bar template image: monochrome black, macOS will apply tinting -->

  <!-- Connection line -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left node - ring -->
  <circle cx="9" cy="16" r="5.5" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Left node - dot -->
  <circle cx="9" cy="16" r="2" fill="black"/>

  <!-- Right node - ring -->
  <circle cx="23" cy="16" r="5.5" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Right node - dot -->
  <circle cx="23" cy="16" r="2" fill="black"/>

  <!-- Small satellite dots (suggesting multiple ports) -->
  <circle cx="5" cy="10.5" r="1.2" fill="black" opacity="0.5"/>
  <line x1="6" y1="11.2" x2="7.2" y2="13" stroke="black" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <circle cx="5" cy="21.5" r="1.2" fill="black" opacity="0.5"/>
  <line x1="6" y1="20.8" x2="7.2" y2="19" stroke="black" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <circle cx="27" cy="10.5" r="1.2" fill="black" opacity="0.5"/>
  <line x1="26" y1="11.2" x2="24.8" y2="13" stroke="black" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <circle cx="27" cy="21.5" r="1.2" fill="black" opacity="0.5"/>
  <line x1="26" y1="20.8" x2="24.8" y2="19" stroke="black" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
</svg>
