<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#29b6f6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background: full bleed square (macOS applies its own rounded mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.04" stroke="#4fc3f7" stroke-width="1" fill="none">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Connection line - soft glow layer -->
  <line x1="340" y1="512" x2="684" y2="512" stroke="#4fc3f7" stroke-width="8" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Connection line - main -->
  <line x1="340" y1="512" x2="684" y2="512" stroke="url(#glow)" stroke-width="6" stroke-linecap="round" filter="url(#lineGlow)"/>

  <!-- Data dots on the line -->
  <circle cx="440" cy="512" r="5" fill="#81d4fa" opacity="0.7"/>
  <circle cx="512" cy="512" r="4" fill="#b3e5fc" opacity="0.5"/>
  <circle cx="584" cy="512" r="5" fill="#81d4fa" opacity="0.7"/>

  <!-- Left node - outer ring glow -->
  <circle cx="340" cy="512" r="140" fill="#4fc3f7" opacity="0.06" filter="url(#softGlow)"/>
  <!-- Left node - outer ring -->
  <circle cx="340" cy="512" r="130" fill="none" stroke="url(#glow)" stroke-width="5" opacity="0.5"/>
  <!-- Left node - filled circle -->
  <circle cx="340" cy="512" r="95" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="4"/>
  <!-- Left node - inner port dot -->
  <circle cx="340" cy="512" r="36" fill="url(#glow)" filter="url(#nodeGlow)"/>
  <!-- Left node - highlight -->
  <circle cx="326" cy="496" r="12" fill="white" opacity="0.3"/>

  <!-- Right node - outer ring glow -->
  <circle cx="684" cy="512" r="140" fill="#4fc3f7" opacity="0.06" filter="url(#softGlow)"/>
  <!-- Right node - outer ring -->
  <circle cx="684" cy="512" r="130" fill="none" stroke="url(#glow)" stroke-width="5" opacity="0.5"/>
  <!-- Right node - filled circle -->
  <circle cx="684" cy="512" r="95" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="4"/>
  <!-- Right node - inner port dot -->
  <circle cx="684" cy="512" r="36" fill="url(#glow)" filter="url(#nodeGlow)"/>
  <!-- Right node - highlight -->
  <circle cx="670" cy="496" r="12" fill="white" opacity="0.3"/>

  <!-- Satellite connection points -->
  <!-- Top-left -->
  <line x1="258" y1="408" x2="286" y2="448" stroke="#4fc3f7" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <circle cx="250" cy="398" r="12" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="398" r="5" fill="#4fc3f7" opacity="0.45"/>

  <!-- Bottom-left -->
  <line x1="258" y1="616" x2="286" y2="576" stroke="#4fc3f7" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <circle cx="250" cy="626" r="12" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="626" r="5" fill="#4fc3f7" opacity="0.45"/>

  <!-- Top-right -->
  <line x1="766" y1="408" x2="738" y2="448" stroke="#4fc3f7" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <circle cx="774" cy="398" r="12" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
  <circle cx="774" cy="398" r="5" fill="#4fc3f7" opacity="0.45"/>

  <!-- Bottom-right -->
  <line x1="766" y1="616" x2="738" y2="576" stroke="#4fc3f7" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <circle cx="774" cy="626" r="12" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
  <circle cx="774" cy="626" r="5" fill="#4fc3f7" opacity="0.45"/>
</svg>
